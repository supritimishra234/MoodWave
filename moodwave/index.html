<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>MoodWave</title>

    <link rel="stylesheet" href="2.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

</head>

<body>



<header class="navbar">

    <div class="logo">
        MoodWave
    </div>

    <div class="search-box">
        <input type="text" placeholder="Search mood">
    </div>

    <div class="mode-btn">
        <button onclick="toggleMode()">Mode</button>
    </div>

</header>




<section class="hero">

    <div class="hero-text">

        <h1>FEEL THE MOOD</h1>

        <p>Music and wallpapers based on your mood</p>

        <button>Explore</button>

    </div>

</section>





<section class="moods">

    <h2>Select Mood</h2>

    <div class="mood-box">

        <div class="card">😊 Happy</div>
        <div class="card">😢 Sad</div>
        <div class="card">😌 Relax</div>
        <div class="card">🔥 Energy</div>

    </div>

</section>




<section class="wallpapers">

    <h2>Wallpapers</h2>

    <div class="wall-box">

        <img src="https://picsum.photos/200/120">
        <img src="https://picsum.photos/201/120">
        <img src="https://picsum.photos/202/120">

    </div>

</section>
<script src="3.js"></script>

</body>
</html>
